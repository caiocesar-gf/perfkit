jdk:
  - openjdk17

before_install:
  # JitPack environments do not ship local.properties.
  - echo sdk.dir=$ANDROID_HOME > local.properties

build:
  # Publish the root aggregator POM first (consumers use com.github.caiocesar-gf:perfkit:TAG),
  # then publish all four SDK library modules for advanced/modular usage.
  - ./gradlew publishPerfkitPublicationToMavenLocal
      :sdk-api:publishReleasePublicationToMavenLocal
      :sdk-core:publishReleasePublicationToMavenLocal
      :sdk-strictmode:publishReleasePublicationToMavenLocal
      :sdk-debug-ui:publishReleasePublicationToMavenLocal
